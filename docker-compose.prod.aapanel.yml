# Stack produksi varian aaPanel.
#
# Nginx + SSL di-handle oleh aaPanel (host-level), jadi compose ini
# HANYA menjalankan `db` + `app`. App di-bind ke 127.0.0.1:3000 supaya
# tidak ter-expose ke public — aaPanel nginx akan proxy ke sini.
#
# Jalankan:
#   docker compose -f docker-compose.prod.aapanel.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: siap-pkl-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - siap_pkl_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: siap-pkl-app:latest
    container_name: siap-pkl-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      NEXT_PUBLIC_SEKOLAH_LATITUDE: ${NEXT_PUBLIC_SEKOLAH_LATITUDE:--7.9124}
      NEXT_PUBLIC_SEKOLAH_LONGITUDE: ${NEXT_PUBLIC_SEKOLAH_LONGITUDE:-111.3956}
      DB_HOST: db
      DB_PORT: "5432"
      RUN_SEED_ON_START: "true"
    # Bind ke loopback saja — aaPanel nginx yang reach port ini.
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal

volumes:
  siap_pkl_db_data:

networks:
  internal:
    driver: bridge
