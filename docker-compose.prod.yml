# Stack produksi SIAP PKL untuk VPS.
#
# Jalankan:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Service:
#   - db       : PostgreSQL 16, data di volume terpisah (tidak ter-expose ke public)
#   - app      : Next.js 16 (standalone) — migrate deploy saat boot
#   - nginx    : reverse proxy + HTTPS (Let's Encrypt via certbot)
#   - certbot  : renew SSL (one-shot mode; dijadwalkan via cron host)

services:
  db:
    image: postgres:16-alpine
    container_name: siap-pkl-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - siap_pkl_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: siap-pkl-app:latest
    container_name: siap-pkl-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      NEXT_PUBLIC_SEKOLAH_LATITUDE: ${NEXT_PUBLIC_SEKOLAH_LATITUDE:--7.9124}
      NEXT_PUBLIC_SEKOLAH_LONGITUDE: ${NEXT_PUBLIC_SEKOLAH_LONGITUDE:-111.3956}
      DB_HOST: db
      DB_PORT: "5432"
      RUN_SEED_ON_START: "true"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: siap-pkl-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    container_name: siap-pkl-certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    # Mode renewal — dijalankan oleh cron host:
    #   0 3 * * * docker compose -f docker-compose.prod.yml run --rm certbot renew --quiet
    # Lalu reload nginx: docker compose exec nginx nginx -s reload
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do sleep 12h; done"]

volumes:
  siap_pkl_db_data:

networks:
  internal:
    driver: bridge
