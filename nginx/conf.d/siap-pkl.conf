# Konfigurasi Nginx produksi SIAP PKL.
#
# Dua mode:
#   1. Bootstrap (HTTP-only) — untuk step pertama issue sertifikat Let's Encrypt.
#      Uncomment blok "BOOTSTRAP" di bawah, comment blok "PRODUCTION".
#   2. Production (HTTPS) — setelah cert ter-issue, uncomment blok PRODUCTION.
#
# Ganti `siap-pkl.example.com` dengan domain kamu sebelum deploy.

# ============================================================
# BOOTSTRAP (HTTP-only) — aktifkan saat pertama kali issue cert.
# ============================================================
# server {
#   listen 80;
#   server_name siap-pkl.example.com;
#
#   # Challenge ACME untuk certbot.
#   location /.well-known/acme-challenge/ {
#     root /var/www/certbot;
#   }
#
#   # Proxy ke app (tanpa redirect ke HTTPS).
#   location / {
#     proxy_pass http://app:3000;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#   }
# }

# ============================================================
# PRODUCTION (HTTPS) — aktifkan setelah cert ter-issue.
# ============================================================

# Redirect HTTP → HTTPS (kecuali path ACME).
server {
  listen 80;
  server_name siap-pkl.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS reverse proxy ke Next.js app.
server {
  listen 443 ssl;
  http2 on;
  server_name siap-pkl.example.com;

  ssl_certificate     /etc/letsencrypt/live/siap-pkl.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/siap-pkl.example.com/privkey.pem;

  # SSL best practice (Mozilla intermediate).
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Batasi upload body (import siswa max 5MB, beri margin).
  client_max_body_size 10M;

  # Static Next.js assets — cache panjang (konten immutable karena hash).
  location /_next/static/ {
    proxy_pass http://app:3000;
    proxy_cache_valid 200 60m;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Public folder
  location /public/ {
    proxy_pass http://app:3000;
    add_header Cache-Control "public, max-age=3600";
  }

  # Default: reverse proxy semua request ke Next.js.
  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;

    # WebSocket / HMR (tidak dipakai di prod, tapi tidak merugikan).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }
}
